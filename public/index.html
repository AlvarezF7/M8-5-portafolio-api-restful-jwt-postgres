<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Go-Art</title>
</head>
<body>
    <header>
        <nav id="navExpand" class="navbar navbar-expand-lg " >
            <div class="container-fluid">
                <h2 class="navbar-brand" href="#">Go-Art</h2>
                <button id="btnBurger"class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link active" aria-current="page" href="/index.html">Home</a>
                        <a class="nav-link" href="/about.html">About</a>
                       <!--<a class="nav-link" href="/contacto.html">contact</a>  -->          
                    </div>
                <!-- btn login register and carrito-->      
                <div class="ms-auto">   
                    <span id="usuarioLogueado"></span>
                  <button  class="btn btn-outline-primary" id="btnLogin" type="button" data-bs-toggle ="modal" data-bs-target="#loginModal">Login</button> 
                    <button id="btnCerrarSession" class="btn btn-outline-primary"> <i class="bi bi-person-dash"></i></button> 
                    <button id="btnCarrito" class="btn btn-warning position-relative" type="button" data-bs-toggle ="offcanvas" data-bs-target="#containerCarrito" aria-controls="offcanvasRight">
                        <img src="./img/iconcar.png"  alt="carrito" class="img-fluid" style="width: 25px; height: 25px;">
                    </button>
                    
                    <div id="contenedorCarrito" class="d-none"></div>
                </div>
                </div>
            </div>
        </nav>
        <div id="banner" class="text-center my-">
            <h2> Go-Art </h2>
            <p>Bienvenido a Go-Art tu tienda de suministros favorita!!</p>
       </div>     
    </header>
   <main>
    <div class="cardContainer" id="cardMuestra" >
       <!-- Contiene las tarjetas de productos--> 
      </div>
      <!----------- Carrito--------->
      <div class="offcanvas offcanvas-end " tabindex="-1" id="containerCarrito" aria-labelledby="offcanvasRightLabel">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasLabel">Tienes  Productos</h5>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body" id="offCanvasCarrito">
          <table id="carritoTable" class="table table-hover">
            <thead>
              <tr>
                <th scope="col">Producto</th>
                <th scope="col">Cantidad</th>
                <th scope="col">P. Unitario</th>
                <th scope="col">SubTotal</th>
              </tr>
            </thead>
          <tbody id="carritoBody">
            <!-- filas dinamicas-->
          </tbody> 
        </table>
        <br><br>
        <!-- resumen carrito-->
        <section class="mt-3" id="totalCarrito">
          <p id="subtotal"></p>
          <p id="iva"><strong></strong></p>
          <p id="total"><strong></strong></p>
          <button class="btn btn-primary w-100" id="btnCompra">Comprar</button>
        </section> 
            </div>
          </div>
      </div>  
      <!--modal comprobate de compra-->
    <div class="modal fade" id="modalResumen" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Resumen de Compra</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="modalResumenBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" id="btnDetalle" data-bs-dismiss="modal"id="cerrarModal">Volver a Productos</button>
          </div>
        </div>
      </div>
</div>
    </main>     
<!---------------------footer----------------------------->
   <footer class="foo">
       <p> Siguenos</p>
        <div class="social-icon">       
            <img class="iconSo" src="./img/instagram.png" alt="instaLogo">
            <img class="iconSo" src="./img/wsp4.png" alt="wspLogo">
            <img class="iconSo" src="./img/faceb.png" alt="faceLogo">
            <img class="iconSo" src="./img/you.png" alt="youLogo">
        </div>
        <p>&copy; Go-Art todos los derechos reservados 2026</p>
    </footer> 
<!--Modal Login -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="ModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="modalTitle">Iniciar Sesión </h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="formLogin">
              <div class="mb-3">
                <label for="user" class="col-form-label">Usuario:</label>
                <input type="text" class="form-control" id="user">
              </div>
              <div class="mb-3">
                <label for="password" class="col-form-label">Contraseña:</label>
                <input type="password" class="form-control" id="password" autocomplete="current-password">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-bs-toggle="modal" id="btnCrearCta" data-bs-target="#modalRegistrarse">Crear Cuenta</button>
            <button type="button" class="btn btn-primary" id="btnIniciarSesion" >Iniciar Sesión</button>
          </div>
        </div>
      </div>
    </div>
<!-- Modal Registrarse-->
    <div class="modal fade" id="modalRegistrarse" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fs-5" id="modalCreateCta">Crear cuenta</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
        <div class="modal-body">
          <form id="formCuenta">
            <div class="mb-3">
              <label for="nameUser" class="form-label">Nombre Usuario:</label>
              <input type="text" class="form-control" id="nameUser" required>
            </div>
            <div class="mb-3">
              <label for="createPass" class="form-label">Contarseña:</label>
              <input type="password" class="form-control" id="createPass" autocomplete="new-password" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Correo Electronico:</label>
              <input type="text" class="form-control" id="email" required>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-primary" id="createAcount">Registrarse</button>
              <button type="button" class="btn btn-secondary" id="btnVolver" data-bs-dismiss="modal" data-bs-toggle="modal" data-bs-target="#loginModal">
                <i class="bi bi-arrow-left" ></i>Volver</button>         
          </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js" defer></script>
</body>
</html>
